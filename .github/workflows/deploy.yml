name: Deploy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm. This will run terraform apply and update the live site.'
        required: true
        default: ""

permissions:
  id-token: write   # Required for OIDC token exchange
  contents: read

env:
  TF_VERSION: "~1.7"
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  AWS_REGION: "us-east-1"

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Verify confirmation input
        if: github.event.inputs.confirm != 'deploy'
        run: |
          echo "::error::Confirmation input must be exactly 'deploy'."
          echo "::error::Got: '${{ github.event.inputs.confirm }}'"
          exit 1


      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          # Wrap terraform output so raw values don't include debug lines.
          terraform_wrapper: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml


      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}


      - name: Write backend.tf
        run: |
          cat > infra/backend.tf <<EOF
          terraform {
            backend "s3" {
              bucket         = "${{ secrets.TF_STATE_BUCKET }}"
              key            = "smart-inbox/terraform.tfstate"
              region         = "${{ env.AWS_REGION }}"
              dynamodb_table = "${{ secrets.TF_LOCK_TABLE }}"
              encrypt        = true
            }
          }
          EOF

      - name: Write terraform.tfvars
        run: |
          cat > infra/terraform.tfvars <<EOF
          inbox_bucket_name    = "${{ secrets.TF_INBOX_BUCKET }}"
          frontend_bucket_name = "${{ secrets.TF_FRONTEND_BUCKET }}"
          alarm_email          = "${{ secrets.TF_ALARM_EMAIL }}"
          EOF

      - name: Terraform init
        working-directory: infra
        run: terraform init

 
      - name: Terraform plan
        working-directory: infra
        run: terraform plan -out=tfplan


      - name: Terraform apply
        working-directory: infra
        run: terraform apply -auto-approve tfplan


      - name: Capture Terraform outputs
        id: tf
        working-directory: infra
        run: |
          echo "api_endpoint=$(terraform output -raw api_endpoint)"            >> $GITHUB_OUTPUT
          echo "frontend_bucket=$(terraform output -raw frontend_bucket)"      >> $GITHUB_OUTPUT
          echo "cf_dist_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT


      - name: Install frontend dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Build static export
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: ${{ steps.tf.outputs.api_endpoint }}
        run: pnpm run build


      - name: Sync to S3
        run: |
          aws s3 sync apps/web/out/ \
            "s3://${{ steps.tf.outputs.frontend_bucket }}" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "*.html" \
            --exclude "*.json"
          # HTML and JSON get short cache so refreshes pick up new deployments.
          aws s3 sync apps/web/out/ \
            "s3://${{ steps.tf.outputs.frontend_bucket }}" \
            --delete \
            --cache-control "public,max-age=0,must-revalidate" \
            --include "*.html" \
            --include "*.json"


      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf.outputs.cf_dist_id }}" \
            --paths "/*"
