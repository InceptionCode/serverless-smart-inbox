###############################################################################
# CI — runs on every push to main and every pull request.
#
# Jobs:
#   web    — pnpm install → lint → typecheck → test → build
#   infra  — terraform fmt -check → init -backend=false → validate
#   python — ruff check → py_compile on all handler modules
#
# No AWS credentials are needed here. Terraform runs with -backend=false
# so the remote state bucket is never touched. Deploy is a separate workflow.
###############################################################################

name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # Frontend — Next.js 15 (static export), pnpm, vitest
  # ---------------------------------------------------------------------------
  web:
    name: Frontend — lint / typecheck / test / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type-check
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm run test:run

      # Build last — catches output-mode issues and env-var misconfigurations.
      # NEXT_PUBLIC_API_URL is intentionally left unset here; the build must
      # succeed without it (dashboard falls back to demo data when undefined).
      - name: Build (static export)
        run: pnpm run build

  # ---------------------------------------------------------------------------
  # Infrastructure — Terraform format + validate (no backend, no AWS access)
  # ---------------------------------------------------------------------------
  infra:
    name: Infra — fmt / validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      # Fails if any .tf file is not canonically formatted.
      - name: Format check
        run: terraform fmt -check -recursive

      # -backend=false skips S3 state initialisation — safe for CI.
      - name: Init (no backend)
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate

  # ---------------------------------------------------------------------------
  # Python — ruff lint + compile check on all handler modules + tooling
  # ---------------------------------------------------------------------------
  python:
    name: Python — ruff / compile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install "ruff>=0.8"

      - name: Lint handlers and tooling
        run: ruff check handlers/ tooling/src/

      # py_compile catches syntax errors and bad imports at parse time.
      # It does not execute the module, so missing boto3 is not a problem here.
      - name: Compile check — processor
        run: |
          python -m py_compile handlers/processor/handler.py
          python -m py_compile handlers/processor/message_types.py
          python -m py_compile handlers/processor/utils.py

      - name: Compile check — read_api
        run: |
          python -m py_compile handlers/read_api/handler.py
          python -m py_compile handlers/read_api/message_types.py
          python -m py_compile handlers/read_api/utils.py

      - name: Compile check — shared utils
        run: python -m py_compile handlers/utils.py
