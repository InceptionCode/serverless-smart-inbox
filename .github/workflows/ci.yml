name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  web:
    name: Frontend — lint / typecheck / test / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type-check
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm run test:run
      - name: Build (static export)
        run: pnpm run build

  infra:
    name: Infra — fmt / validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      # Fails if any .tf file is not canonically formatted.
      - name: Format check
        run: terraform fmt -check -recursive

      # -backend=false skips S3 state initialisation — safe for CI.
      - name: Init (no backend)
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate

  python:
    name: Python — ruff / compile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install "ruff>=0.8"

      - name: Lint handlers and tooling
        run: ruff check handlers/ tooling/src/

      # py_compile catches syntax errors and bad imports at parse time.
      # It does not execute the module, so missing boto3 is not a problem here.
      - name: Compile check — processor
        run: |
          python -m py_compile handlers/processor/handler.py
          python -m py_compile handlers/processor/message_types.py
          python -m py_compile handlers/processor/utils.py

      - name: Compile check — read_api
        run: |
          python -m py_compile handlers/read_api/handler.py
          python -m py_compile handlers/read_api/message_types.py
          python -m py_compile handlers/read_api/utils.py

      - name: Compile check — shared utils
        run: python -m py_compile handlers/utils.py
